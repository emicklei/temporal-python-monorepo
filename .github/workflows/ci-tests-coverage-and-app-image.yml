name: Tests and Coverage

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - apps/*/v*

jobs:
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4

      - name: Install dependencies
        run: |
          pdm install -G dev
          pdm run pip install pytest-cov

      - name: Run tests with coverage
        run: |
          shopt -s nullglob
          COV_ARGS=()

          for ROOT in apps pkgs; do
            for SRC_PATH in "$ROOT"/*/src/*; do
              if [[ -d "$SRC_PATH" && "$(basename "$SRC_PATH")" != "__pycache__" ]]; then
                COV_ARGS+=("--cov=$SRC_PATH")
              fi
            done
          done

          pdm run pytest -q apps pkgs \
            "${COV_ARGS[@]}" \
            --cov-fail-under=90 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=markdown:coverage.md

      - name: Add coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          cat coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
            coverage.md

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: emicklei/temporal-python-monorepo

  build-app-image-from-tag:
    if: startsWith(github.ref, 'refs/tags/apps/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse app and version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ ! "$TAG" =~ ^apps/([^/]+)/((v[0-9]+\.[0-9]+\.[0-9]+))$ ]]; then
            echo "Unsupported tag format: $TAG"
            echo "Expected: apps/<folder>/v<major>.<minor>.<patch>"
            exit 1
          fi

          APP_FOLDER="${BASH_REMATCH[1]}"
          VERSION_TAG="${BASH_REMATCH[2]}"

          echo "app_folder=$APP_FOLDER" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify app Dockerfile exists
        run: |
          APP_PATH="apps/${{ steps.parse.outputs.app_folder }}"

          if [[ ! -f "$APP_PATH/Dockerfile" ]]; then
            echo "Missing Dockerfile at $APP_PATH/Dockerfile"
            exit 1
          fi

      - name: Build Docker image using Makefile
        run: |
          APP_FOLDER="${{ steps.parse.outputs.app_folder }}"
          VERSION_TAG="${{ steps.parse.outputs.version_tag }}"

          make -C "apps/$APP_FOLDER" docker-build \
            IMAGE_NAME="$APP_FOLDER:$VERSION_TAG"
